<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="interactive-comments">
        <section class="comments-list" aria-label="User comments">
            <div class="comments-container"></div>
            <form class="comment-area">
                <img src="assests/images/image-juliusomo.png" alt="Your avatar" class="avatar">
                <textarea name="new-comment" placeholder="Add a comment" aria-label="Add a commnet" class="input_place"
                    required></textarea>
                <button type="submit" class="btn-submit">SEND</button>
            </form>

        </section>
    </main>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h2 class="modal-title">Delete comment</h2>
            <p class="modal-text">Are you sure you want to delete this comment? This will remove the comment and can't
                be undone.</p>
            <div class="modal-btns">
                <button class="modal-btn cancel-btn" id="cancelDelete">NO, CANCEL</button>
                <button class="modal-btn confirm-btn" id="confirmDelete">YES, DELETE</button>
            </div>
        </div>
    </div>
    <script type="module" src="scripts/script.js"></script>
</body>

</html>
